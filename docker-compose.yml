services:
  sysemp-travel:
    image: sysemp-travel
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"

    depends_on:
      sysemp_travel_db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

    environment:
      DB_HOST: sysemp_travel_db
      DB_PORT: 5432
      DB_USER: sysemp
      DB_PASSWORD: eyJhbGciOiJIUzI1Ni
      DB_NAME: sysemp_travel_db
      REDIS_ADDR: redis:6379
      RATE_LIMIT_ENABLED: "${RATE_LIMIT_ENABLED:-true}"
      RATE_LIMIT_REQUESTS: "${RATE_LIMIT_REQUESTS:-10}"
      RATE_LIMIT_WINDOW_SECONDS: "${RATE_LIMIT_WINDOW_SECONDS:-60}"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/

  worker:
    image: sysemp-travel
    command: ["worker"]
    restart: unless-stopped

    depends_on:
      rabbitmq:
        condition: service_healthy

    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/


  sysemp_travel_db:
    image: postgres:12

    environment:
      POSTGRES_USER: sysemp
      POSTGRES_PASSWORD: eyJhbGciOiJIUzI1Ni
      POSTGRES_DB: sysemp_travel_db

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sysemp -d sysemp_travel_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management

    ports:
      - "5672:5672"
      - "15672:15672"

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata: {}
  redis_data: {}
